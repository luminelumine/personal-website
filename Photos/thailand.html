<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thailand — Luminescence</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .city-header {
      padding: 48px 240px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
    }
    .city-header-left h1 {
      font-family: var(--windsor);
      font-size: clamp(22px, 3vw, 42px);
      font-weight: 400;
      letter-spacing: 0.04em;
      color: #fff;
      line-height: 1;
    }
    .city-header-left .city-subtitle {
      margin-top: 10px;
      font-size: 15px;
      font-style: italic;
      color: rgba(255,255,255,0.62);
      letter-spacing: 0.06em;
    }
    .city-header-right {
      font-family: var(--windsor);
      font-size: 13px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      white-space: nowrap;
      padding-bottom: 3px;
    }

    .city-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px 40px;
      padding: 32px 240px 64px;
    }

    .city-item {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #0e0e0e;
      border: 1px solid var(--border);
      cursor: pointer;
      display: block;
    }

    .city-item img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      filter: grayscale(10%);
      transition: filter 0.4s ease, transform 0.5s ease;
    }

    .city-item:hover img {
      filter: grayscale(0%);
      transform: scale(1.03);
      transition: filter 0.4s ease, transform 0.6s ease;
    }

    .city-item:hover { border-color: #333; }

    #lb {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.97);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    #lb.open { opacity: 1; pointer-events: all; }

    #lb-img {
      max-width: 80vw;
      max-height: 86vh;
      object-fit: contain;
      display: block;
      user-select: none;
    }

    .lb-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.28);
      font-size: 32px;
      cursor: pointer;
      padding: 24px 36px;
      line-height: 1;
      transition: color 0.2s;
      z-index: 10;
    }
    .lb-btn:hover { color: rgba(255,255,255,0.85); }
    #lb-prev { left: 0; }
    #lb-next { right: 0; }

    #lb-close {
      position: absolute;
      top: 28px; right: 36px;
      font-family: var(--windsor);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      transition: color 0.2s;
    }
    #lb-close:hover { color: #fff; }

    #lb-counter {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--windsor);
      font-size: 10px;
      letter-spacing: 0.16em;
      color: rgba(255,255,255,0.28);
      white-space: nowrap;
    }

    @media (max-width: 900px) {
      .city-header { padding: 40px 80px 28px; }
      .city-grid { grid-template-columns: repeat(2, 1fr); padding: 28px 80px 60px; gap: 18px 28px; }
    }
    @media (max-width: 600px) {
      .city-header { padding: 36px 40px 24px; flex-direction: column; align-items: flex-start; }
      .city-grid { grid-template-columns: repeat(2, 1fr); padding: 20px 40px 60px; gap: 12px; }
    }
  </style>
</head>
<body>

<div id="page-fade"></div>

<nav class="nav">
  <a class="nav-logo" href="../index.html" onclick="fadeOut(event,'../index.html')">Luminescence</a>
  <a class="nav-back" href="../photos.html" onclick="fadeOut(event,'../photos.html')">← Photography</a>
</nav>

<div class="city-header">
  <div class="city-header-left">
    <h1>Thailand</h1>
    <p class="city-subtitle">Selected photographs</p>
  </div>
  <div class="city-header-right">4 photographs</div>
</div>

<div class="city-grid">
  <div class="city-item" onclick="openLb(0)">
    <img src="Thailand/01.jpg" alt="Thailand">
  </div>
  <div class="city-item" onclick="openLb(1)">
    <img src="Thailand/000060.jpg" alt="Thailand">
  </div>
  <div class="city-item" onclick="openLb(2)">
    <img src="Thailand/000060_副本.jpg" alt="Thailand">
  </div>
  <div class="city-item" onclick="openLb(3)">
    <img src="Thailand/000064.jpg" alt="Thailand">
  </div>
</div>

<div id="lb">
  <span id="lb-close" onclick="closeLb()">Close ✕</span>
  <button class="lb-btn" id="lb-prev" onclick="stepLb(-1)">‹</button>
  <img id="lb-img" src="" alt="">
  <button class="lb-btn" id="lb-next" onclick="stepLb(1)">›</button>
  <span id="lb-counter"></span>
</div>

<script>
  function fadeOut(e, url) {
    e.preventDefault();
    document.getElementById('page-fade').classList.add('out');
    setTimeout(() => { window.location.href = url; }, 580);
  }

  const photos = ["Thailand/01.jpg", "Thailand/000060.jpg", "Thailand/000060_副本.jpg", "Thailand/000064.jpg"];
  let current = 0;

  function openLb(idx) {
    current = idx;
    updateLb();
    document.getElementById('lb').classList.add('open');
  }

  function closeLb() {
    document.getElementById('lb').classList.remove('open');
    setTimeout(() => { document.getElementById('lb-img').src = ''; }, 260);
  }

  function stepLb(dir) {
    current = (current + dir + photos.length) % photos.length;
    updateLb();
  }

  function updateLb() {
    document.getElementById('lb-img').src = photos[current];
    document.getElementById('lb-counter').textContent = (current + 1) + ' / ' + photos.length;
  }

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lb').classList.contains('open')) return;
    if (e.key === 'Escape') closeLb();
    if (e.key === 'ArrowLeft') stepLb(-1);
    if (e.key === 'ArrowRight') stepLb(1);
  });

  document.getElementById('lb').addEventListener('click', function(e) {
    if (e.target === this) closeLb();
  });
</script>
</body>
</html>
