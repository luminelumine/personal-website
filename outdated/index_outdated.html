<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luminescence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    @font-face {
      font-family: 'Modernline';
      src: url('modernline-personal-use/modernline.otf') format('opentype');
      font-weight: normal;
    }
    @font-face {
      font-family: 'Modernline';
      src: url('modernline-personal-use/modernline bold.otf') format('opentype');
      font-weight: bold;
    }

    :root {
      --modernline: 'Modernline', 'Cormorant Garamond', Georgia, serif;
    }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }

    #hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    #site-title {
      position: absolute;
      top: 32px;
      left: 40px;
      font-family: var(--modernline);
      font-size: clamp(18px, 2vw, 30px);
      font-weight: 400;
      letter-spacing: 0.28em;
      color: #fff;
      text-transform: lowercase;
      text-shadow: 0 1px 16px rgba(0,0,0,0.85);
      z-index: 30;
      pointer-events: none;
    }

    #overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 20;
    }

    .dot-group { pointer-events: all; cursor: pointer; }

    .dot-outer {
      r: 12; fill: rgba(255,255,255,0.08);
      transition: r 0.4s ease, fill 0.4s ease;
    }
    .dot-inner {
      r: 5; fill: rgba(255,255,255,0.75);
      transition: r 0.35s ease, fill 0.35s ease, filter 0.35s ease;
      filter: drop-shadow(0 0 4px rgba(255,255,255,0.6));
    }
    .dot-group:hover .dot-outer { r: 40; fill: rgba(255,255,255,0.15); }
    .dot-group:hover .dot-inner {
      r: 8; fill: rgba(255,255,255,1);
      filter: drop-shadow(0 0 14px #fff) drop-shadow(0 0 28px rgba(255,255,255,0.6));
    }

    /* ── 星芒 Version D: Soft Minimal ── */
    .star-flare { pointer-events: none; }
    .ray-heavy { stroke: white; stroke-linecap: round; stroke-opacity: 0; transition: stroke-opacity 0.5s ease; }
    .ray-fine  { stroke: white; stroke-linecap: round; stroke-opacity: 0; transition: stroke-opacity 0.5s ease; }
    /* idle: subtle glow always visible */
    .dot-group .ray-heavy { stroke-opacity: 0.45; }
    .dot-group .ray-fine  { stroke-opacity: 0.55; }
    /* hover: brighter */
    .dot-group:hover .ray-heavy { stroke-opacity: 0.75; }
    .dot-group:hover .ray-fine  { stroke-opacity: 0.9; }

    #fade {
      position: fixed; inset: 0; background: #000;
      opacity: 0; pointer-events: none; z-index: 100;
      transition: opacity 0.55s ease;
    }
    #fade.out { opacity: 1; pointer-events: all; }

    /* ── Option B slim: compact bottom bar ── */
    /* Two-state heights:
       collapsed = 40px  (dot + name always visible)
       expanded  = 80px  (on hover: name + desc)        */
    #mini-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 60;
    }

    .mini-track {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.62);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .mini-card {
      display: flex;
      align-items: center;        /* vertically centre the name row */
      padding: 0 32px;
      height: 32px;               /* compact default height */
      border-right: 1px solid rgba(255,255,255,0.06);
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: height 0.38s cubic-bezier(0.22, 1, 0.36, 1),
                  background 0.25s ease;
    }
    .mini-card:last-child { border-right: none; }
    .mini-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: rgba(255,255,255,0);
      transition: background 0.25s ease;
    }
    .mini-card:hover {
      height: 60px;
      background: rgba(255,255,255,0.03);
    }
    .mini-card:hover::before { background: rgba(255,255,255,0.3); }

    .mini-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.45);
      flex-shrink: 0;
      box-shadow: 0 0 5px rgba(255,255,255,0.35);
      transition: background 0.25s, box-shadow 0.25s;
      display: none; /* hidden — dot-tag handles the dot on the image */
    }

    /* name row — always visible */
    .mini-name-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .mini-indicator {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      flex-shrink: 0;
      transition: background 0.25s, box-shadow 0.25s;
    }
    .mini-card:hover .mini-indicator {
      background: #fff;
      box-shadow: 0 0 6px #fff, 0 0 12px rgba(255,255,255,0.4);
    }

    .mini-name {
      font-family: var(--modernline);
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: lowercase;
      color: rgba(255,255,255,0.55);
      transition: color 0.25s, letter-spacing 0.25s;
    }
    .mini-card:hover .mini-name {
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.36em;
    }

    /* desc — absolutely positioned below name, fades in on hover */
    .mini-desc {
      position: absolute;
      bottom: 10px;
      left: 45px;               /* aligns with name text, past dot + gap */
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 11px;
      font-style: italic;
      color: rgba(255,255,255,0);
      letter-spacing: 0.04em;
      white-space: nowrap;
      transition: color 0.2s ease 0.1s;
    }
    .mini-card:hover .mini-desc { color: rgba(255,255,255,0.4); }

    /* ── Option C: dot labels always visible ── */

    /* Each label is absolutely positioned in the SVG's coordinate space
       via a foreign-object-like approach — we use HTML overlays instead,
       pinned with CSS custom properties set by JS on resize. */

    .dot-tag {
      position: fixed;
      display: flex;
      align-items: center;
      gap: 10px;
      pointer-events: none;   /* clicks fall through to SVG dot */
      z-index: 25;
      transition: opacity 0.3s ease;
    }

    .dot-tag-line {
      height: 1px;
      background: rgba(255,255,255,0.28);
      flex-shrink: 0;
      width: 22px;
      transition: width 0.35s cubic-bezier(0.22, 1, 0.36, 1),
                  background 0.3s ease;
    }

    .dot-tag-text {
      font-family: var(--modernline);
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: lowercase;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
      transition: color 0.3s ease, letter-spacing 0.3s ease;
    }

    /* When the sibling dot-group is hovered, amplify the tag */
    .dot-group:hover + .dot-tag .dot-tag-line,
    .dot-tag.active .dot-tag-line {
      width: 34px;
      background: rgba(255,255,255,0.7);
    }
    .dot-group:hover + .dot-tag .dot-tag-text,
    .dot-tag.active .dot-tag-text {
      color: rgba(255,255,255,0.95);
      letter-spacing: 0.42em;
    }
  </style>
</head>
<body>

<script>
  /* ══════════════════════════════════════════════════
     Ambient sound engine — each dot has its own sound
     Hover = play looping, leave = fade out & stop
  ══════════════════════════════════════════════════ */
  let audioCtx = null;
  let activeNodes = [];   // currently playing nodes

  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  // Unlock on first interaction
  document.addEventListener('click', () => getCtx(), { once: true });
  document.addEventListener('mouseenter', () => getCtx(), { once: true, capture: true });

  /* ── Stop all active nodes with short fade-out ── */
  function stopAll() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    activeNodes.forEach(({ gainNode, source }) => {
      try {
        gainNode.gain.cancelScheduledValues(now);
        gainNode.gain.setValueAtTime(gainNode.gain.value, now);
        gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
        setTimeout(() => { try { source.stop(); } catch(e){} }, 500);
      } catch(e) {}
    });
    activeNodes = [];
  }

  /* ── Noise buffers ── */
  function brownNoise(ctx, sec) {
    const sr = ctx.sampleRate, len = sr * sec;
    const buf = ctx.createBuffer(2, len, sr);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch); let last = 0;
      for (let i = 0; i < len; i++) {
        const w = Math.random() * 2 - 1;
        last = (last + 0.02 * w) / 1.02;
        d[i] = last * 3.5;
      }
    }
    return buf;
  }
  function whiteNoise(ctx, sec) {
    const sr = ctx.sampleRate, len = sr * sec;
    const buf = ctx.createBuffer(2, len, sr);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    }
    return buf;
  }

  /* ════════════════════════════════════════════════
     SOUND: Ocean Waves (马 · writings)
     Deep brown noise + slow LFO swell
  ════════════════════════════════════════════════ */
  function startOcean(ctx) {
    const now = ctx.currentTime; const nodes = [];
    // Main ocean body
    const src = ctx.createBufferSource();
    src.buffer = brownNoise(ctx, 9); src.loop = true;
    const lpf = ctx.createBiquadFilter(); lpf.type = 'lowpass'; lpf.frequency.value = 380; lpf.Q.value = 1.2;
    const hpf = ctx.createBiquadFilter(); hpf.type = 'highpass'; hpf.frequency.value = 30;
    const g = ctx.createGain(); g.gain.setValueAtTime(0, now); g.gain.linearRampToValueAtTime(0.55, now + 1.4);
    // Wave LFO
    const lfo = ctx.createOscillator(); lfo.frequency.value = 0.07;
    const lg = ctx.createGain(); lg.gain.value = 0.30;
    lfo.connect(lg); lg.connect(g.gain);
    const lfo2 = ctx.createOscillator(); lfo2.frequency.value = 0.19;
    const lg2 = ctx.createGain(); lg2.gain.value = 0.10;
    lfo2.connect(lg2); lg2.connect(g.gain);
    src.connect(lpf); lpf.connect(hpf); hpf.connect(g); g.connect(ctx.destination);
    src.start(now); lfo.start(now); lfo2.start(now);
    nodes.push({source:src,gainNode:g},{source:lfo,gainNode:lg},{source:lfo2,gainNode:lg2});
    // Low rumble
    const rsrc = ctx.createBufferSource();
    rsrc.buffer = brownNoise(ctx, 11); rsrc.loop = true;
    const rlpf = ctx.createBiquadFilter(); rlpf.type = 'lowpass'; rlpf.frequency.value = 80;
    const rg = ctx.createGain(); rg.gain.setValueAtTime(0, now); rg.gain.linearRampToValueAtTime(0.25, now + 1.8);
    rsrc.connect(rlpf); rlpf.connect(rg); rg.connect(ctx.destination);
    rsrc.start(now); nodes.push({source:rsrc,gainNode:rg});
    return nodes;
  }

  /* ════════════════════════════════════════════════
     SOUND: Underwater Drift (人群 · photography)
     Heavy low-pass brown noise, ultra-slow LFO
  ════════════════════════════════════════════════ */
  function startUnderwater(ctx) {
    const now = ctx.currentTime; const nodes = [];
    const src = ctx.createBufferSource();
    src.buffer = brownNoise(ctx, 10); src.loop = true;
    const lpf = ctx.createBiquadFilter(); lpf.type = 'lowpass'; lpf.frequency.value = 120;
    const lpf2 = ctx.createBiquadFilter(); lpf2.type = 'lowpass'; lpf2.frequency.value = 200;
    const g = ctx.createGain(); g.gain.setValueAtTime(0, now); g.gain.linearRampToValueAtTime(0.55, now + 2.0);
    src.connect(lpf); lpf.connect(lpf2); lpf2.connect(g); g.connect(ctx.destination);
    src.start(now); nodes.push({source:src,gainNode:g});
    // Dreamlike LFO
    const lfo = ctx.createOscillator(); lfo.frequency.value = 0.03;
    const lg = ctx.createGain(); lg.gain.value = 0.20;
    lfo.connect(lg); lg.connect(g.gain); lfo.start(now);
    nodes.push({source:lfo,gainNode:lg});
    // Sub tone
    const osc = ctx.createOscillator(); osc.type = 'sine'; osc.frequency.value = 42;
    const og = ctx.createGain(); og.gain.setValueAtTime(0, now); og.gain.linearRampToValueAtTime(0.07, now + 2.2);
    osc.connect(og); og.connect(ctx.destination); osc.start(now);
    nodes.push({source:osc,gainNode:og});
    return nodes;
  }

  /* ════════════════════════════════════════════════
     SOUND: Cat Meow (女人 · about me)
     Real audio file — plays on hover, repeats while hovering
  ════════════════════════════════════════════════ */
  let catTimer = null;
  let catAudioBuffer = null;

  // Pre-load the cat meow WAV via Web Audio API
  fetch('cat-meow.wav')
    .then(r => r.arrayBuffer())
    .then(ab => {
      // Decode lazily — we need audioCtx first
      // Store the raw ArrayBuffer and decode on first use
      catAudioBuffer = ab;
    })
    .catch(() => {});

  let catDecodedBuffer = null;

  function playCatMeow() {
    if (!audioCtx || !catAudioBuffer) return;
    const decode = catDecodedBuffer
      ? Promise.resolve(catDecodedBuffer)
      : audioCtx.decodeAudioData(catAudioBuffer.slice(0)).then(b => { catDecodedBuffer = b; return b; });

    decode.then(buffer => {
      const src = audioCtx.createBufferSource();
      src.buffer = buffer;
      const g = audioCtx.createGain(); g.gain.value = 0.9;
      src.connect(g); g.connect(audioCtx.destination);
      src.start();
    }).catch(() => {});
  }

  function startCat(ctx) {
    // Play immediately, then repeat every 4 seconds while hovering
    playCatMeow();
    catTimer = setInterval(playCatMeow, 4000);
    // Dummy node so stopAll() has something to handle
    const silentGain = ctx.createGain(); silentGain.gain.value = 0;
    const silentOsc = ctx.createOscillator();
    silentOsc.connect(silentGain); silentGain.connect(ctx.destination);
    silentOsc.start(ctx.currentTime); silentOsc.stop(ctx.currentTime + 9999);
    return [{source: silentOsc, gainNode: silentGain}];
  }

  function stopCat() {
    if (catTimer) { clearInterval(catTimer); catTimer = null; }
  }

  /* ════════════════════════════════════════════════
     Assign sounds to dots via data-sound attribute
  ════════════════════════════════════════════════ */
  const soundMap = {
    'ocean':      startOcean,
    'underwater': startUnderwater,
    'cat':        startCat,
  };

  document.querySelectorAll('.dot-group').forEach(g => {
    g.addEventListener('mouseenter', () => {
      try {
        const ctx = getCtx();
        if (ctx.state === 'suspended') return;
        stopAll();
        stopCat();
        const soundName = g.dataset.sound;
        if (soundName && soundMap[soundName]) {
          activeNodes = soundMap[soundName](ctx);
        }
      } catch(e) {}
    });
    g.addEventListener('mouseleave', () => {
      stopAll();
      stopCat();
    });
  });

  /* ── 页面跳转 ── */
  function goTo(url) {
    stopAll(); stopCat();
    document.getElementById('fade').classList.add('out');
    setTimeout(() => { window.location.href = url; }, 580);
  }

  /* ── Option C: position dot-tag labels next to each SVG dot ──
     SVG viewBox is 1536×1024, dots are at:
       about me:    cx=772  cy=505
       writings:    cx=310  cy=638
       photography: cx=1242 cy=400
     Tags appear to the right of each dot (offset by ~18px from centre).
     We recalc on load and resize.                                       */

  const DOT_COORDS = {
    'tag-about':       { cx: 772,  cy: 505 },
    'tag-writings':    { cx: 310,  cy: 638 },
    'tag-photography': { cx: 1242, cy: 400 },
  };

  function positionTags() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    // SVG uses xMidYMid slice — figure out scale and offset
    const svgAR  = 1536 / 1024;
    const winAR  = vw / vh;
    let scale, offX, offY;
    if (winAR > svgAR) {
      // width-constrained: svg fills full width
      scale = vw / 1536;
      offX  = 0;
      offY  = (vh - 1024 * scale) / 2;
    } else {
      // height-constrained: svg fills full height
      scale = vh / 1024;
      offX  = (vw - 1536 * scale) / 2;
      offY  = 0;
    }

    Object.entries(DOT_COORDS).forEach(([id, { cx, cy }]) => {
      const tag = document.getElementById(id);
      if (!tag) return;
      const px = offX + cx * scale + 14 * scale;  // 14px right of dot centre
      const py = offY + cy * scale - 7;            // vertically centred on dot
      tag.style.left = px + 'px';
      tag.style.top  = py + 'px';
    });
  }

  positionTags();
  window.addEventListener('resize', positionTags);

  /* Hover amplification: since tags are siblings of body (not SVG),
     we wire up mouseenter/mouseleave on the dot-groups manually */
  const tagMap = {
    0: 'tag-about',
    1: 'tag-writings',
    2: 'tag-photography',
  };
  document.querySelectorAll('.dot-group').forEach((g, i) => {
    const tag = document.getElementById(tagMap[i]);
    if (!tag) return;
    g.addEventListener('mouseenter', () => tag.classList.add('active'));
    g.addEventListener('mouseleave', () => tag.classList.remove('active'));
  });

</script>
</body>
</html>
